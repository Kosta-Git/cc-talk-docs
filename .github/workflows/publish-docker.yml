name: Publish Docker image

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read API crate version
        id: api-version
        shell: bash
        run: |
          version="$({
            sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' api/Cargo.toml
          } | head -n 1)"

          if [[ -z "$version" ]]; then
            echo "Could not read the package version from api/Cargo.toml" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/cc-talk-docs:${{ steps.api-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
